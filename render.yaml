services:
  - type: web
    name: eapcet-backend-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SCRAPER_HEADLESS
        value: "true"
      - key: SCRAPER_SLOWMO
        value: "0"
      - key: SCRAPER_TIMEOUT
        value: "60000"
      - key: FRONTEND_URL
        value: "https://your-vercel-frontend-domain.vercel.app"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
